name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install gifski (Windows)
        shell: pwsh
        run: |
          choco install gifski -y --no-progress
          Write-Host "Files in chocolatey gifski lib:"
          Get-ChildItem "C:\ProgramData\chocolatey\lib\gifski" -Recurse | Select-Object FullName
          $bin = Get-ChildItem "C:\ProgramData\chocolatey\lib\gifski" -Recurse |
                 Where-Object { -not $_.PSIsContainer -and $_.Name -like "gifski*" } |
                 Select-Object -First 1
          if (-not $bin) { Write-Error "gifski binary not found"; exit 1 }
          Write-Host "Found gifski at $($bin.FullName)"
          Copy-Item $bin.FullName src-tauri\resources\gifski-win-x64.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: SpecialGifskiX-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
