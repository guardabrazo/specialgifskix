name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon runner (arm64)
            target: aarch64-apple-darwin
            gifski-name: gifski-mac-arm64

          - platform: macos-13       # Intel runner (x64)
            target: x86_64-apple-darwin
            gifski-name: gifski-mac-x64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            gifski-name: gifski-win-x64.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # ── macOS: install gifski from Homebrew (FFmpeg-enabled build) ──────────
      - name: Install gifski (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gifski
          cp "$(brew --prefix)/bin/gifski" src-tauri/resources/${{ matrix.gifski-name }}
          chmod 755 src-tauri/resources/${{ matrix.gifski-name }}

      # ── Windows: install gifski from Chocolatey (FFmpeg-enabled build) ──────
      - name: Install gifski (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install gifski -y --no-progress
          $bin = (Get-Command gifski -ErrorAction SilentlyContinue).Source
          if (-not $bin) { $bin = "$env:ChocolateyInstall\bin\gifski.exe" }
          Copy-Item $bin src-tauri\resources\gifski-win-x64.exe

      # ── Tauri build ─────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SpecialGifskiX-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SpecialGifskiX-windows-x64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
